<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEDICACE DU NOUVEAU TESTAMENT AYIZO EN DECEMBRE 2026 - Badge Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
:root{
    --primary-blue: #1D3297;
    --primary-red: #A74A3D;
    --dark: #1C1B2B;
    --gray: #5A5967;
    --light-gray: #B1B5BB;
    --white: #FFFFFF;
}
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--dark); 
            color: rgb(226, 220, 220); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 450px;
            background: var(--primary-blue);
            padding: 40px 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(233, 38, 38, 0.5);
            text-align: center;
            border: 1px solid rgba(26, 12, 2, 0.959);
            position: relative;
        }
        .header img { width: 100px; margin-bottom: 20px; }
        h1 { color: var(--gold); margin: 0; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 2px; }
        p { color: #888; font-size: 0.9rem; margin-top: 10px; margin-bottom: 30px; }
        
        .upload-box {
            background: rgba(255,255,255,0.03);
            border: 2px dashed var(--gray);
            border-radius: 20px;
            padding: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 25px;
            display: block;
        }
        .upload-box:hover { background: rgba(241, 196, 15, 0.05); transform: translateY(-3px); }
        .upload-box img { width: 50px; margin-bottom: 10px; }
        .upload-box span { display: block; color: #bbb; font-size: 0.85rem; }

        .btn-generate {
            background: var(--primary-red);
            color: rgb(247, 243, 243);
            border:(--red);
            width: 100%;
            padding: 18px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-generate:hover { transform: scale(1.03); box-shadow: 0 0 20px rgba(241, 26, 36, 0.4); }
        
        input[type="file"] { display: none; }
        
        #result { display: none; margin-top: 30px; border-top: 1px solid #333; padding-top: 25px; }
        #result img { width: 100%; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn-download { background: #f1091c; color: rgb(20, 1, 1); text-decoration: none; display: block; padding: 15px; border-radius: 50px; font-weight: 600; text-align: center; }
        
        .loader { display: none; margin: 20px 0; border: 3px solid #333; border-top: 3px solid var(--gold); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loading-zone { display: none; }

        footer {
            margin-top: 30px;
            font-size: 0.75rem;
            color: #4e4c4c;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 15px;
        }
        footer strong { color: var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src=https://res.cloudinary.com/dernvf30u/image/upload/v1780672525/logo.jnp_txeang.jpg alt="logo">
        <h1>DEDICACE DU NOUVEAU TESTAMENT AYIZO EN DECEMBRE 2026</h1>
        <p>OUI, je participe à cet événement</p>
    </div>

    <form id="form">
        <label class="upload-box" for="file">
            <img src=https://res.cloudinary.com/dernvf30u/image/upload/v1780672438/logo1.jnp_zabp77.png alt="logo1">
            <span id="filename">Clique pour choisir ta photo</span>
            <input type="file" id="file" name="photo" accept="image/*" required>
        </label>
        
        <button type="submit" class="btn-generate" id="btn-text">GÉNÉRER MON BADGE</button>
        <div id="loading-zone"><div class="loader"></div></div>
    </form>

    <div id="result">
        <img id="preview" src="">
        <a id="download" download="mon-badge-Nouveau Testament Ayizo.png" class="btn-download">TÉLÉCHARGER LE BADGE</a>
    </div>

    <footer>
        Plateforme conçue par <strong>A.Emmanuel</strong>
    </footer>
</div>

<canvas id="canvas" style="display:none"></canvas>

<script>
    const form       = document.getElementById('form');
    const file       = document.getElementById('file');
    const filename   = document.getElementById('filename');
    const result     = document.getElementById('result');
    const preview    = document.getElementById('preview');
    const download   = document.getElementById('download');
    const btnText    = document.getElementById('btn-text');
    const loadingZone = document.getElementById('loading-zone');
    const canvas     = document.getElementById('canvas');
    const ctx        = canvas.getContext('2d');

    // ── Afficher le nom du fichier choisi ──
    file.onchange = () => {
        if (file.files[0]) filename.innerText = file.files[0].name;
    };

    form.onsubmit = (e) => {
        e.preventDefault();

        if (!file.files[0]) return;

        btnText.style.display  = 'none';
        loadingZone.style.display = 'block';

        // 1. Lire la photo de l'utilisateur
        const reader = new FileReader();
        reader.onload = (ev) => {
            const userPhoto = new Image();
            userPhoto.onload = () => {

                // 2. Charger le badge Canva depuis Cloudinary
                const badge = new Image();
                badge.crossOrigin = 'anonymous';
                badge.src='https://res.cloudinary.com/dernvf30u/image/upload/v1780904869/Badge_ok_wch4ce.png';

                badge.onload = () => {

                    // 3. Préparer le canvas aux dimensions du badge
                    canvas.width  = badge.naturalWidth;
                    canvas.height = badge.naturalHeight;

                    // 4. Dessiner le badge en fond
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(badge, 0, 0);

                    // 5. Positionner la photo dans le cadre arrondi du badge
                    //    (cadre situé à droite, milieu du badge)
                    const bw = canvas.width;
                    const bh = canvas.height;

                    const photoX = Math.round(bw * 0.515); // bord gauche du cadre
                    const photoY = Math.round(bh * 0.275); // bord haut du cadre
                    const photoW = Math.round(bw * 0.415); // largeur du cadre
                    const photoH = Math.round(bh * 0.265); // hauteur du cadre
                    const radius = Math.round(bw * 0.04);  // arrondi des coins

                    // Découper en rectangle arrondi
                    ctx.save();
                    ctx.beginPath();
                    ctx.moveTo(photoX + radius, photoY);
                    ctx.lineTo(photoX + photoW - radius, photoY);
                    ctx.quadraticCurveTo(photoX + photoW, photoY, photoX + photoW, photoY + radius);
                    ctx.lineTo(photoX + photoW, photoY + photoH - radius);
                    ctx.quadraticCurveTo(photoX + photoW, photoY + photoH, photoX + photoW - radius, photoY + photoH);
                    ctx.lineTo(photoX + radius, photoY + photoH);
                    ctx.quadraticCurveTo(photoX, photoY + photoH, photoX, photoY + photoH - radius);
                    ctx.lineTo(photoX, photoY + radius);
                    ctx.quadraticCurveTo(photoX, photoY, photoX + radius, photoY);
                    ctx.closePath();
                    ctx.clip();

                    // Centrer la photo dans le cadre (object-fit: cover)
                    const scale = Math.max(photoW / userPhoto.width, photoH / userPhoto.height);
                    const sw = userPhoto.width  * scale;
                    const sh = userPhoto.height * scale;
                    const sx = photoX + (photoW - sw) / 2;
                    const sy = photoY + (photoH - sh) / 2;
                    ctx.drawImage(userPhoto, sx, sy, sw, sh);
                    ctx.restore();

                    // 6. Exporter et afficher
                    const dataUrl = canvas.toDataURL('image/png');
                    preview.src    = dataUrl;
                    download.href  = dataUrl;

                    result.style.display    = 'block';
                    btnText.style.display   = 'block';
                    loadingZone.style.display = 'none';
                };

                badge.onerror = () => {
                    loadingZone.style.display = 'none';
                    btnText.style.display = 'block';
                    alert('❌ Impossible de charger le badge depuis Cloudinary.\nVérifie ta connexion internet.');
                };
            };
            userPhoto.src = ev.target.result;
        };
        reader.readAsDataURL(file.files[0]);
    };
</script>

</body>
</html>
